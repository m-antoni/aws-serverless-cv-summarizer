AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CV Summarizer - Fully Parameterized Existing IAM Roles Architecture

# -----------------------------------------------------------------
# Input Parameters (Passed automatically via samconfig.toml)
# -----------------------------------------------------------------
Parameters:
  AuthRequestAuthorizerRoleArn:
    Type: String
    Description: 'IAM Role ARN for AuthRequestAuthorizerFunction'
  GetS3PresignedUrlRoleArn:
    Type: String
    Description: 'IAM Role ARN for GetS3PresignedUrlFunction'
  S3IntakeServiceRoleArn:
    Type: String
    Description: 'IAM Role ARN for S3IntakeServiceFunction'
  S3QueueConsumerRoleArn:
    Type: String
    Description: 'IAM Role ARN for S3QueueConsumerFunction'
  DispatchEmailRoleArn:
    Type: String
    Description: 'IAM Role ARN for DispatchEmailFunction'
  ArchiveJobRecordsRoleArn:
    Type: String
    Description: 'IAM Role ARN for ArchiveJobRecordsFunction'
  CleanupJobRecordsRoleArn:
    Type: String
    Description: 'IAM Role ARN for CleanupJobRecordsFunction'
  SqsQueueArn:
    Type: String
    Description: 'ARN of the SQS FIFO queue'
  S3BucketName:
    Type: String
    Description: 'Name of the existing S3 intake bucket'
    Default: cv-summarizer-dev
  FrontendUrl:
    Type: String
    Description: 'Frontend origin for CORS (e.g. https://example.com)'

# -----------------------------------------------------------------
# Global Configuration
# Applies default settings to all Lambda functions and API Gateway.
# Individual resources can override these values.
# -----------------------------------------------------------------
Globals:
  # =================================================================
  # Lambda Function Defaults
  # Runtime, timeout, architecture, and shared layer applied to
  # every function in the stack.
  # =================================================================
  Function:
    Runtime: nodejs22.x
    Timeout: 15
    Architectures:
      - arm64
    Layers:
      - !Ref SharedDependencyLayer

  # =================================================================
  # API Gateway Defaults
  # Global CORS configuration for all API endpoints.
  # AllowOrigin is parameterized via FrontendUrl.
  # =================================================================
  Api:
    Cors:
      AllowMethods: "'OPTIONS,POST,GET,PUT,DELETE'"
      AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: !Sub "'${FrontendUrl}'"

# -----------------------------------------------------------------
# Resources
# -----------------------------------------------------------------
Resources:
  # =================================================================
  # Shared Dependency Layer
  # Bundles node_modules (AWS SDK, Resend, Groq, Nodemailer, etc.)
  # into a Lambda Layer mounted at /opt/nodejs/ for all functions.
  # =================================================================
  SharedDependencyLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: cv-summarizer-dependencies
      ContentUri: layers/shared-dependency/nodejs/
      CompatibleRuntimes:
        - nodejs22.x
    Metadata:
      BuildMethod: nodejs22.x

  # =================================================================
  # Authorizer & Presigned URL Gateway
  # Public endpoint (/authorizer). Validates token, rate-limits,
  # then invokes GetS3PresignedUrlFunction internally.
  # =================================================================
  AuthRequestAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth-request-authorizer/
      FunctionName: cv-summarizer-auth-request-authorizer
      Handler: index.handler
      MemorySize: 256
      Role: !Ref AuthRequestAuthorizerRoleArn
      Events:
        GetAuthEvent:
          Type: Api
          Properties:
            Path: /authorizer
            Method: GET
        PostAuthEvent:
          Type: Api
          Properties:
            Path: /authorizer
            Method: POST

  # =================================================================
  # Presigned URL Generator
  # Called by AuthRequestAuthorizer. Returns a pre-signed S3 PUT URL
  # so the frontend can upload files directly to the bucket.
  # =================================================================
  GetS3PresignedUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/get-s3-presigned-url/
      FunctionName: cv-summarizer-get-s3-presigned-url
      Handler: index.handler
      MemorySize: 256
      Role: !Ref GetS3PresignedUrlRoleArn

  # =================================================================
  # S3 Intake Service
  # Triggered by S3 ObjectCreated events. Stores file metadata in
  # DynamoDB, then sends a message to the SQS queue for processing.
  # =================================================================
  S3IntakeServiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/s3-intake-service/
      FunctionName: cv-summarizer-s3-intake-service
      Handler: index.handler
      MemorySize: 128
      Role: !Ref S3IntakeServiceRoleArn

  # =================================================================
  # S3 → Lambda Permission
  # Allows the S3 bucket to invoke the S3IntakeServiceFunction.
  # =================================================================
  S3IntakeServicePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt S3IntakeServiceFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub arn:aws:s3:::${S3BucketName}

  # =================================================================
  # SQS Queue Consumer
  # Polls the SQS FIFO queue. Extracts text via Textract, runs AI
  # summarization via Groq, updates DynamoDB, then triggers
  # DispatchEmailFunction.
  # =================================================================
  S3QueueConsumerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/s3-queue-consumer/
      FunctionName: cv-summarizer-s3-queue-consumer
      Handler: index.handler
      MemorySize: 512
      Role: !Ref S3QueueConsumerRoleArn
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !Ref SqsQueueArn
            BatchSize: 1

  # =================================================================
  # Email Dispatcher
  # Triggered by S3QueueConsumer. Reads the AI summary from S3,
  # sends the result email to the candidate via Nodemailer, and
  # marks the job as email_sent in DynamoDB.
  # =================================================================
  DispatchEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/dispatch-email/
      FunctionName: cv-summarizer-dispatch-email
      Handler: index.handler
      MemorySize: 512
      Role: !Ref DispatchEmailRoleArn

  # =================================================================
  # Midnight Archive Job
  # Triggered daily at 16:00 UTC (midnight PH time). Scans all
  # DynamoDB records, archives them as JSON to S3, then invokes
  # CleanupJobRecordsFunction.
  # =================================================================
  ArchiveJobRecordsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 300 # 5 minutes
      CodeUri: src/archive-job-records/
      FunctionName: cv-summarizer-archive-job-records
      Handler: index.handler
      MemorySize: 512
      Role: !Ref ArchiveJobRecordsRoleArn
      Events:
        MidnightArchive:
          Type: Schedule
          Properties:
            Schedule: cron(0 16 * * ? *)
            Name: cv-summarizer-midnight-archive
            Description: Trigger midnight archive job
            Input: '{"action": "midnight_archive"}'

  # =================================================================
  # Cleanup Job Records
  # Called by ArchiveJobRecords. Reads the archive JSON, deletes all
  # uploaded files from S3 (uploads/), batch-deletes DynamoDB items,
  # logs the operation, and sends a cleanup report email via Resend.
  # Idempotent — safe to retry without duplicate emails.
  # =================================================================
  CleanupJobRecordsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 300 # 5 minutes
      CodeUri: src/cleanup-job-records/
      FunctionName: cv-summarizer-cleanup-job-records
      Handler: index.handler
      MemorySize: 512
      Role: !Ref CleanupJobRecordsRoleArn

# -----------------------------------------------------------------
# System Outputs
# Values returned after stack deployment. Useful for frontend
# configuration and CI/CD pipelines.
# -----------------------------------------------------------------
Outputs:
  # =================================================================
  # API Gateway Endpoint URL
  # The public production URL for the /authorizer endpoint.
  # Used by the frontend to send authorization requests.
  # =================================================================
  ApiGatewayEndpoint:
    Description: 'The public production URL endpoint for your API Gateway instance'
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/'
